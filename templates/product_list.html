!DOCTYPE html>
<html>
<head>
    <title>Shop Thời Trang</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/script.js' %}"></script>

</head>

<body>

<header>
    <h1>SHOP THỜI TRANG</h1>
</header>

<nav>
    <a href="/">Trang chủ</a>
    <a href="/cart/">Giỏ hàng</a>
    <a href="/orders/">Đơn hàng</a>
</nav>

<div class="container">

    <div class="product-grid">

        <div class="product-card">
            <img src="https://picsum.photos/300/200">
            <h3>Áo thun nam</h3>
            <p class="price">200.000đ</p>
            <button onclick="addToCart('Áo thun nam')">Thêm giỏ</button>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/201">
            <h3>Quần jean</h3>
            <p class="price">350.000đ</p>
            <button onclick="addToCart('Quần jean')">Thêm giỏ</button>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/202">
            <h3>Áo khoác</h3>
            <p class="price">500.000đ</p>
            <button onclick="addToCart('Áo khoác')">Thêm giỏ</button>
        </div>

        <div class="product-card">
            <img src="https://picsum.photos/300/203">
            <h3>Áo hoodie</h3>
            <p class="price">450.000đ</p>
            <button onclick="addToCart('Áo hoodie')">Thêm giỏ</button>
        </div>

    </div>

</div>

</body>
</html>
